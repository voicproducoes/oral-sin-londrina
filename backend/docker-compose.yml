version: '3.8'

services:
  capi:
    image: voictech-capi:latest
    volumes:
      - /opt/voictech-capi/clients.json:/app/clients.json:ro
      - /opt/voictech-capi/.env:/app/.env:ro
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.voictech-capi.rule=Host(`capi.voictech.com.br`)"
        - "traefik.http.routers.voictech-capi.entrypoints=websecure"
        - "traefik.http.routers.voictech-capi.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.voictech-capi.service=voictech-capi"
        - "traefik.http.services.voictech-capi.loadbalancer.server.port=3001"
        - "traefik.http.services.voictech-capi.loadbalancer.passHostHeader=true"

networks:
  network_swarm_public:
    external: true
